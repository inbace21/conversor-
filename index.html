<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Unidades - S.I.</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;

            /* --- AQUÍ VAN LOS CAMBIOS PARA LA IMAGEN --- */
            background-color: var(--background); 
            background-image: url('https://s1.significados.com/foto/naturaleza-bosque-lago-cke.jpg?class=article'); 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
            background-attachment: fixed; 
        }
        }

        .converter-card {
            background-color: rgba(255, 255, 255, 0.85);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 600px;
            backdrop-filter: blur(5px);
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        select, input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .conversion-row {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .conversion-col {
            flex: 1;
        }

        .equals {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-muted);
            margin-top: 1.5rem;
        }

        /* --- NUEVOS ESTILOS PARA LA LISTA DINÁMICA --- */
        .unit-info-container {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
        }

        .unit-info-container h3 {
            font-size: 1rem;
            color: var(--text-main);
            margin-top: 0;
            margin-bottom: 1rem;
        }

        .unit-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.5rem;
        }

        .unit-list li {
            background-color: var(--background);
            padding: 0.6rem;
            border-radius: 6px;
            font-size: 0.85rem;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .unit-name {
            color: var(--text-muted);
        }

        .unit-symbol {
            font-weight: bold;
            color: var(--primary-color);
            font-size: 1rem;
        }

        footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="converter-card">
        <h1>Conversor del Sistema Internacional</h1>
        
        <div class="form-group">
            <label for="magnitude">Magnitud:</label>
            <select id="magnitude"></select>
        </div>

        <div class="conversion-row">
            <div class="conversion-col">
                <label for="input-value">De:</label>
                <input type="number" id="input-value" value="1" step="any">
                <select id="unit-from"></select>
            </div>
            
            <div class="equals">=</div>

            <div class="conversion-col">
                <label for="output-value">A:</label>
                <input type="number" id="output-value" readonly>
                <select id="unit-to"></select>
            </div>
        </div>

        <div class="unit-info-container">
            <h3>Unidades Disponibles:</h3>
            <ul class="unit-list" id="unit-list">
                </ul>
        </div>

        <footer>
            Trabajo de Aplicación - Tema 1: Sistema internacional de medidas
        </footer>
    </div>

    <script>
        // Diccionario de conversiones
        const conversionData = {
            "Masa": {
                "Ton": 1000, "Kg": 1, "g": 0.001, "mg": 0.000001, "ug": 0.000000001
            },
            "Volumen": {
                "Gal": 3.78541, "m³": 1000, "L": 1, "mL": 0.001, "uL": 0.000001
            },
            "Distancia": {
                "km": 1000, "m": 1, "cm": 0.01, "mm": 0.001, "Yarda": 0.9144, "pulgada": 0.0254
            },
            "Densidad": {
                "Kg/m³": 1, "g/mL": 1000, "Kg/L": 1000, "g/L": 1
            },
            "Presión": {
                "Atm": 101325, "Pa": 1, "mmHg": 133.322, "Torr": 133.322, "psi": 6894.76
            },
            "Tiempo": {
                "hora": 3600, "min": 60, "s": 1
            },
            "Fuerza": {
                "Kilonewton": 1000, "Newton": 1, "Micronewton": 0.000001, "Kilogramofuerza": 9.80665, "Dina": 0.00001
            },
            "Energía": {
                "Kcal": 4.184, "KJ": 1
            }
        };

        // --- NUEVO: Diccionario para los nombres completos ---
        const unitNames = {
            "Ton": "Tonelada", "Kg": "Kilogramo", "g": "Gramo", "mg": "Miligramo", "ug": "Microgramo",
            "Gal": "Galón", "m³": "Metro cúbico", "L": "Litro", "mL": "Mililitro", "uL": "Microlitro",
            "km": "Kilómetro", "m": "Metro", "cm": "Centímetro", "mm": "Milímetro", "Yarda": "Yarda", "pulgada": "Pulgada",
            "Kg/m³": "Kilogramo / metro³", "g/mL": "Gramo / mililitro", "Kg/L": "Kilogramo / litro", "g/L": "Gramo / litro",
            "Atm": "Atmósfera", "Pa": "Pascal", "mmHg": "Milímetro de mercurio", "Torr": "Torr", "psi": "Libra / pulgada²",
            "hora": "Hora", "min": "Minuto", "s": "Segundo",
            "Kilonewton": "Kilonewton", "Newton": "Newton", "Micronewton": "Micronewton", "Kilogramofuerza": "Kilogramo-fuerza", "Dina": "Dina",
            "Kcal": "Kilocaloría", "KJ": "Kilojoule"
        };

        const magnitudeSelect = document.getElementById('magnitude');
        const unitFromSelect = document.getElementById('unit-from');
        const unitToSelect = document.getElementById('unit-to');
        const inputValue = document.getElementById('input-value');
        const outputValue = document.getElementById('output-value');
        const unitListContainer = document.getElementById('unit-list'); // Selector de la nueva lista

        // Inicializar magnitudes
        function init() {
            for (const mag in conversionData) {
                const option = document.createElement('option');
                option.value = mag;
                option.textContent = mag;
                magnitudeSelect.appendChild(option);
            }
            populateUnits();
            calculate();
        }

        // Llenar los selects de unidades y actualizar la lista de información
        function populateUnits() {
            const selectedMag = magnitudeSelect.value;
            const units = Object.keys(conversionData[selectedMag]);
            
            unitFromSelect.innerHTML = '';
            unitToSelect.innerHTML = '';
            unitListContainer.innerHTML = ''; // Limpiar la lista inferior

            units.forEach((unit, index) => {
                // Llenar selects
                const option1 = document.createElement('option');
                option1.value = unit;
                option1.textContent = unit;
                unitFromSelect.appendChild(option1);

                const option2 = document.createElement('option');
                option2.value = unit;
                option2.textContent = unit;
                if (index === 1 && units.length > 1) option2.selected = true; 
                unitToSelect.appendChild(option2);

                // --- NUEVO: Crear las tarjetas de información de unidades ---
                const li = document.createElement('li');
                const fullName = unitNames[unit] || unit; // Obtiene el nombre o usa el símbolo si no lo encuentra
                
                li.innerHTML = `
                    <span class="unit-symbol">${unit}</span>
                    <span class="unit-name">${fullName}</span>
                `;
                unitListContainer.appendChild(li);
            });
        }

        // Realizar el cálculo
        function calculate() {
            const mag = magnitudeSelect.value;
            const fromUnit = unitFromSelect.value;
            const toUnit = unitToSelect.value;
            const val = parseFloat(inputValue.value);

            if (isNaN(val)) {
                outputValue.value = '';
                return;
            }

            const fromFactor = conversionData[mag][fromUnit];
            const toFactor = conversionData[mag][toUnit];

            let result = (val * fromFactor) / toFactor;

            if (result !== 0 && (result < 0.000001 || result > 999999999)) {
                outputValue.value = result.toExponential(6);
            } else {
                outputValue.value = parseFloat(result.toFixed(6)); 
            }
        }

        // Event Listeners
        magnitudeSelect.addEventListener('change', () => {
            populateUnits();
            calculate();
        });

        unitFromSelect.addEventListener('change', calculate);
        unitToSelect.addEventListener('change', calculate);
        inputValue.addEventListener('input', calculate);

        // Arrancar la app
        init();
    </script>
</body>
</html>
